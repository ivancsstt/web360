<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>360 3D no Quest</title>
  
  <!-- 1. Carrega o A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- 2. Registra o componente Stereo ANTES de carregar o corpo do site -->
  <script>
    AFRAME.registerComponent('stereo', {
      schema: { eye: { type: 'string', default: 'left' } },
      init: function () {
        // Camada 1 para o olho esquerdo, Camada 2 para o olho direito
        this.layer = this.data.eye === 'left' ? 1 : 2;
        this.el.object3D.layers.set(this.layer);
      }
    });
  </script>
</head>
<body>

  <a-scene>
    <a-assets>
      <!-- Insira o nome do seu arquivo de imagem aqui -->
      <img id="imagem360" src="360.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- Olho Esquerdo: Pega a metade de CIMA (offset 0.5) -->
    <a-sky src="#imagem360" 
           stereo="eye: left" 
           material="repeat: 1 0.5; offset: 0 0.5">
    </a-sky>
    
    <!-- Olho Direito: Pega a metade de BAIXO (offset 0) -->
    <a-sky src="#imagem360" 
           stereo="eye: right" 
           material="repeat: 1 0.5; offset: 0 0">
    </a-sky>

    <a-camera look-controls></a-camera>
  </a-scene>

</body>
</html>
