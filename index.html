<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Experiência 360 3D no Quest</title>
  <!-- Importa o framework A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>

  <!-- A cena VR principal -->
  <a-scene>
    
    <!-- Gerenciador de Assets: Carrega sua imagem de forma otimizada -->
    <a-assets>
      <!-- Substitua 'sua-imagem-3d.jpg' pelo caminho real ou URL da sua foto 360 -->
      <img id="imagem360" src="360.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- O céu/esfera 360. O segredo está no componente stereo -->
    <!-- stereo="eye: left" diz para renderizar o topo; a segunda esfera renderiza a base -->
    <a-sky src="#imagem360" 
           stereo="eye: left" 
           geometry="phiLength: 360"
           material="repeat: 1 0.5; offset: 0 0.5">
    </a-sky>
    
    <a-sky src="#imagem360" 
           stereo="eye: right" 
           geometry="phiLength: 360"
           material="repeat: 1 0.5; offset: 0 0">
    </a-sky>

    <!-- Câmera básica -->
    <a-camera look-controls></a-camera>

  </a-scene>

  <!-- Script complementar para gerenciar a separação dos olhos (Stereo Component) -->
  <script>
    AFRAME.registerComponent('stereo', {
      schema: { eye: { type: 'string', default: 'left' } },
      init: function () {
        this.layer = this.data.eye === 'left' ? 1 : 2;
        this.el.object3D.layers.set(this.layer);
      }
    });
  </script>
</body>
</html>
